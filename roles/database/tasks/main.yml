---
# This role also covers the network-storage-topology side of
# rivolution_install_mode (NFS export for server, autofs mount for
# client) since both are about where the database/audio store
# actually live relative to this host -- not just literally "database"
# tasks.

- name: Install and configure local MariaDB (standalone/server only)
  when: rivolution_install_mode in ['standalone', 'server']
  block:
    - name: Install MariaDB
      ansible.builtin.apt:
        name:
          - mariadb-server
          - mariadb-client
        state: present

    - name: Start and enable MariaDB
      ansible.builtin.systemd:
        name: mariadb
        state: started
        enabled: true

    # Equivalent of mariadb-secure-installation's interactive wizard,
    # minus "disallow remote root login" -- Ubuntu's default
    # root@localhost already uses the unix_socket auth plugin, which
    # only works from a local root shell to begin with, so there's
    # nothing remote to disable.
    - name: Remove anonymous MariaDB users
      ansible.builtin.command:
        cmd: mysql -e "DELETE FROM mysql.user WHERE User=''; FLUSH PRIVILEGES;"
      changed_when: false

    - name: Remove the test database
      ansible.builtin.command:
        cmd: mysql -e "DROP DATABASE IF EXISTS test;"
      changed_when: false

# Server mode exposes the database and audio store to other Rivendell
# hosts over the network -- standalone/client don't need any of this.
- name: Export database access and the audio store over the network (server only)
  when: rivolution_install_mode == 'server'
  block:
    - name: Install NFS server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present

    - name: Create the NFS-exported directories
      ansible.builtin.file:
        path: "/srv/nfs4/{{ item }}"
        state: directory
        mode: "0775"
      loop:
        - var/snd
        - "home/{{ rivolution_user }}/music_export"
        - "home/{{ rivolution_user }}/music_import"
        - "home/{{ rivolution_user }}/traffic_export"
        - "home/{{ rivolution_user }}/traffic_import"
        - "home/{{ rivolution_user }}/rd_xfer"

    - name: Add the export entries to /etc/exports
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: "/srv/nfs4/{{ item }} *(rw,no_root_squash)"
        create: true
      loop:
        - var/snd
        - "home/{{ rivolution_user }}/music_export"
        - "home/{{ rivolution_user }}/music_import"
        - "home/{{ rivolution_user }}/traffic_export"
        - "home/{{ rivolution_user }}/traffic_import"
        - "home/{{ rivolution_user }}/rd_xfer"
      notify: Re-export NFS shares

# Client mode skips the local database/audio store entirely and points
# at a remote host for both instead.
- name: Mount the remote audio store over NFS (client only)
  when: rivolution_install_mode == 'client'
  block:
    - name: Install NFS client support
      ansible.builtin.apt:
        name: nfs-common
        state: present

    # /var/snd is the fixed system path the audio store always lives
    # at, regardless of station -- mounted directly via fstab, not
    # through autofs (which is reserved for the per-station-named
    # staging directories below), matching the real Paravel
    # installer's own client-mode behavior.
    - name: Create the local /var/snd mount point
      ansible.builtin.file:
        path: /var/snd
        state: directory
        mode: "0775"

    - name: Mount the remote audio store at /var/snd
      ansible.posix.mount:
        path: /var/snd
        src: "{{ rivolution_remote_nfs_host }}:/srv/nfs4/var/snd"
        fstype: nfs4
        opts: rw
        state: mounted

    - name: Install autofs
      ansible.builtin.apt:
        name: autofs
        state: present

    - name: Template the autofs audio-store map
      ansible.builtin.template:
        src: auto.rd.audiostore.j2
        dest: /etc/auto.rd.audiostore
        mode: "0644"
      notify: Restart autofs

    - name: Reference the audio-store map from the master autofs map
      ansible.builtin.lineinfile:
        path: /etc/auto.master
        line: "/misc /etc/auto.rd.audiostore"
        create: true
      notify: Restart autofs

    - name: Symlink the remote-mounted directories into the build user's home
      ansible.builtin.file:
        src: "/misc/{{ item }}"
        dest: "{{ rivolution_home }}/{{ item }}"
        state: link
        force: true
      loop:
        - rd_xfer
        - music_export
        - music_import
        - traffic_export
        - traffic_import
