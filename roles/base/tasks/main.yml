---
- name: Update apt cache and upgrade existing packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ rivolution_hostname }}"
  when: rivolution_hostname != "localhost"

- name: Pin 127.0.1.1 to the new hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1\t{{ rivolution_hostname }}"
  when: rivolution_hostname != "localhost"

# Matches the manual walkthrough in rivolution.wiki's Build-From-Source
# guide -- dpkg-reconfigure's debconf prompt is interactive by design,
# but site.yml already sets DEBIAN_FRONTEND=noninteractive, so this
# applies the system's already-configured default non-interactively
# rather than blocking on a prompt that can never be answered.
- name: Set NTP time sync
  ansible.builtin.command:
    cmd: timedatectl set-ntp yes
  changed_when: false

- name: Create the unprivileged build/desktop user
  ansible.builtin.user:
    name: "{{ rivolution_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

# deb-multimedia.org provides the non-free codec packages
# (libmp3lame-dev/libtwolame-dev/etc.) that Ubuntu ships directly via
# universe/multiverse but Debian's free-software policy excludes from
# its own main repos. Must run before the package list below, which
# depends on it for the Debian target.
- name: Add the deb-multimedia repo (Debian only)
  when: rivolution_target_os == 'debian'
  block:
    - name: Download the deb-multimedia keyring package
      ansible.builtin.get_url:
        url: https://www.deb-multimedia.org/pool/main/d/deb-multimedia-keyring/deb-multimedia-keyring_2024.9.1_all.deb
        dest: /tmp/deb-multimedia-keyring.deb
        mode: "0644"

    - name: Install the deb-multimedia keyring
      ansible.builtin.apt:
        deb: /tmp/deb-multimedia-keyring.deb

    - name: Add the deb-multimedia repo
      ansible.builtin.apt_repository:
        repo: "deb https://www.deb-multimedia.org {{ ansible_distribution_release }} main non-free"
        filename: deb-multimedia
        state: present
        update_cache: true

# Reconciled directly against rivolution.wiki's Build-From-Source
# guide -- verified working on a real DigitalOcean droplet (Ubuntu
# 24.04). Qt6, not Qt5 -- libqt5webkit5-dev has no Qt6 equivalent at
# all, replaced by qt6-webengine-dev.
- name: Install build dependencies
  ansible.builtin.apt:
    name:
      - git
      - g++
      - automake
      - autoconf
      - autoconf-archive
      - libtool
      - libltdl-dev
      - make
      - debhelper
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-l10n-tools
      - qt6-webengine-dev
      - qt6-webengine-dev-tools
      - libqt6sql6-mysql
      - libexpat1-dev
      - libexpat1
      - libid3-dev
      - libcurl4-gnutls-dev
      - libcoverart-dev
      - libdiscid-dev
      - libmusicbrainz5-dev
      - libcdparanoia-dev
      - libsndfile1-dev
      - libpam0g-dev
      - libvorbis-dev
      - libsamplerate0-dev
      - libsoundtouch-dev
      - libsystemd-dev
      - libjack-jackd2-dev
      - libasound2-dev
      - libflac-dev
      - libflac++-dev
      - libmp3lame-dev
      - libmad0-dev
      - libtwolame-dev
      - libssl-dev
      - libtag1-dev
      - libmagick++-dev
      - alsa-utils
      - alsa-tools
      - alsa-tools-gui
      - alsa-firmware-loaders
      - libasound2-plugins
      - docbook5-xml
      - docbook-xsl-ns
      - xsltproc
      - fop
      - libxml2-utils
      - python3
      - python3-pycurl
      - python3-pymysql
      - python3-serial
      - python3-requests
      - python3-venv
      - python3-virtualenv
      - python3-build
      - twine
      - apache2
      - mariadb-server
      - mariadb-client
      - mp3gain
      - openssh-server
      - gnupg
      - pbuilder
      - apt-file
    state: present

# linux-modules-extra and ubuntu-dev-tools are literally Ubuntu-branded
# -- linux-modules-extra-<kernel> doesn't exist as a separate package
# on Debian (its audio/extra kernel modules ship in the base
# linux-image package instead), and ubuntu-dev-tools has no Debian
# equivalent at all (pbuilder itself, already installed above, is what
# the build actually needs).
- name: Install Ubuntu-only packages
  ansible.builtin.apt:
    name:
      - "linux-modules-extra-{{ ansible_kernel }}"
      - ubuntu-dev-tools
    state: present
  when: rivolution_target_os == 'ubuntu'
